name: Copilot Auto Review Request

on:
  pull_request:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  request-copilot-review:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to review (idempotent)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: existingComments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const hasExistingCopilotReview = existingComments.some(
              (comment) => comment.body && comment.body.includes("@copilot review"),
            );

            if (hasExistingCopilotReview) {
              console.log("Copilot review comment already exists for this pull request; skipping creation.");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: "@copilot review\n\nPlease review this PR for correctness, maintainability, and potential regressions."
            });
